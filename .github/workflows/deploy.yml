name: Deploy to Azure Static Web Apps
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"   # daily ~06:30 IST: refresh featured essays from Substack

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh posts + build site
        run: |
          python site_posts_pull.py --limit 6 || echo "posts pull skipped"
          python build_site.py
      - name: Persist refreshed content (scheduled only)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "site-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "site: daily posts refresh" || echo "no changes"
          git push || echo "nothing to push"
      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          action: upload
          app_location: "dist"
          output_location: ""
          skip_app_build: true
